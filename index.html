<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Library</h1>
            <button id="open-btn">Add Book</button>
            <dialog id="add-book-dialog">
                <form id="add-book-form">
                    <legend>Add a New Book</legend>

                    <label for="title">Title *:</label>
                    <input type="text" id="title" name="title" required>

                    <label for="author">Author *:</label>
                    <input type="text" id="author" name="author" required>

                    <label for="pages">Pages *:</label>
                    <input type="number" id="pages" name="pages" required>

                    <p>Status:</p>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="read" value="read">
                            Read
                        </label>
                        <label>
                            <input type="radio" name="read" value="unread" checked>
                            Unread
                        </label>
                    </div>

                    <button id="add-book-btn" type="submit">Add</button>
                </form>
                <button id="close-btn">Cancel</button>
            </dialog>
        </div>
        <div class="content">
            <div class="book-list"></div>
        </div>
    </div>
</body>
</html>
